<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Галерея</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header class="gallery-header">
  <h1><i class="fas fa-images"></i> Фотогалерея</h1>
  <nav>
    <ul class="nav-grid">
      <li><a href="index.html" class="nav-link">Главная</a></li>
      <li><a href="gallery.html" class="nav-link active">Галерея</a></li>
      <li><a href="contacts.html" class="nav-link">Контакты</a></li>
    </ul>
  </nav>
</header>

<main class="gallery-container">
  <div class="controls-panel">
    <div class="stats">
      <span><i class="fas fa-image"></i> Фото: <span id="image-counter">0</span></span>
      <span><i class="fas fa-heart"></i> Лайков: <span id="total-likes">0</span></span>
    </div>
    <div class="filters">
      <button class="filter-btn active" data-filter="all">Все</button>
      <button class="filter-btn" data-filter="nature">Природа</button>
      <button class="filter-btn" data-filter="city">Город</button>
      <button class="filter-btn" data-filter="people">Люди</button>
    </div>
  </div>

  <div class="gallery-grid" id="image-gallery"></div>

  <aside class="gallery-info">
    <h3><i class="fas fa-lightbulb"></i> Интересный факт</h3>
    <p>Свет от Солнца до Земли идёт 8 минут 20 секунд.</p>
  </aside>
</main>

<footer>
  <p>© Иванов Иван, 2026</p>
</footer>

<script src="script.js"></script>
</body>
</html>
